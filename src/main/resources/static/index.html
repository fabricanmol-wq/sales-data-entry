<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Data Entry Management System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            background: white;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h3 {
            font-weight: 700;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h3>Sales Manager</h3>
            <p class="text-muted">Login to access your account</p>
        </div>
        <form id="loginForm">
            <div id="loginError" class="alert alert-danger d-none" role="alert"></div>
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required autocapitalize="none" autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password" required autocapitalize="none">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                        <i class="bi bi-eye" id="togglePasswordIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                Login
            </button>
        </form>
    </div>

    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');
            const errorAlert = document.getElementById('loginError');
            const form = e.target;

            try {
                btn.disabled = true;
                spinner.classList.remove('d-none');
                errorAlert.classList.add('d-none');

                const formData = new URLSearchParams(new FormData(form));

                // Ensure CSRF token is available
                await fetch('/api/auth/status'); // trigger cookie creation if not present
                const csrfToken = getCookie('XSRF-TOKEN');
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    body: formData,
                    headers: { 
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-XSRF-TOKEN': csrfToken
                    }
                });

                if (response.ok) {
                    window.location.href = '/app.html?v=5_' + (new Date().getTime());
                } else {
                    const data = await response.json();
                    errorAlert.textContent = data.message || 'Invalid credentials';
                    errorAlert.classList.remove('d-none');
                }
             } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Server connection error';
                errorDiv.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                spinner.classList.add('d-none');
            }
        });

        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('togglePasswordIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });
    </script>
</body>
</html>
